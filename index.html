<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>English Stories Hub</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">

<h1>English Stories Hub</h1>

<p>
Learn English Through Stories
</p>

</header>

<section class="topBar">

<input
type="text"
id="searchInput"
placeholder="Search stories...">

<select id="levelFilter">

<option value="All">
All Levels
</option>

<option value="A1">
A1
</option>

<option value="A2">
A2
</option>

<option value="B1">
B1
</option>

<option value="B2">
B2
</option>

<option value="C1">
C1
</option>

</select>

<button onclick="toggleTheme()">
🌙 Theme
</button>

</section>

<section class="statsBox">

<div>
Stories:
<span id="storyCount">
0
</span>
</div>

<div>
Favorites:
<span id="favoriteCount">
0
</span>
</div>

<div>
Completed:
<span id="completedCount">
0
</span>
</div>

</section>

<section id="continueReading"></section>

<div id="storyContainer"></div>

<script src="data.js"></script>
<script src="main.js"></script>

</body>
</html>
